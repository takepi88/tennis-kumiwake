<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#6B5FE8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>テニス組み分け</title>
<style>
/* ================================
   Design Tokens
   ================================ */
:root {
  --brand: #6B5FE8;
  --brand-strong: #4A3FC7;
  --brand-deep: #3C3489;
  --brand-soft: #F0EEFF;
  --brand-softer: #F7F5FF;
  --brand-grad: linear-gradient(135deg, #7B6FF0 0%, #5B4FD6 100%);
  --brand-grad-strong: linear-gradient(135deg, #6B5FE8 0%, #3C3489 100%);

  --accent: #E66A3E;
  --accent-deep: #993C1D;
  --accent-soft: #FBEEE6;
  --accent-grad: linear-gradient(135deg, #F0804A 0%, #D85A30 100%);

  --lv-upper: #6B5FE8;
  --lv-upper-bg: #EEEDFE;
  --lv-upper-fg: #3C3489;
  --lv-mid: #10A375;
  --lv-mid-bg: #E1F5EE;
  --lv-mid-fg: #085041;
  --lv-low: #C48530;
  --lv-low-bg: #FAEEDA;
  --lv-low-fg: #633806;

  --bg: #F5F4FB;
  --bg-elev: #ffffff;
  --surface: #ffffff;
  --surface-2: #F7F7FB;
  --surface-3: #EFEFF5;
  --divider: #E5E5EC;
  --divider-strong: #D1D1D8;

  --text: #18181F;
  --text-muted: #6C6C78;
  --text-faint: #A8A8B3;

  --success: #10A375;
  --success-deep: #085041;
  --danger: #D85A30;
  --warn: #E0A928;

  --shadow-sm: 0 1px 2px rgba(15,15,40,0.05);
  --shadow-md: 0 2px 10px rgba(40,30,90,0.06), 0 1px 3px rgba(40,30,90,0.04);
  --shadow-lg: 0 8px 28px rgba(40,30,90,0.09), 0 2px 6px rgba(40,30,90,0.05);

  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;

  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);

  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

@media (prefers-color-scheme: dark) {
  :root {
    --brand-soft: #26224A;
    --brand-softer: #1E1B3A;
    --accent-soft: #3B2218;
    --lv-upper-bg: #2A2554; --lv-upper-fg: #C8BFFF;
    --lv-mid-bg: #0E3A2D;   --lv-mid-fg: #8AE0B9;
    --lv-low-bg: #3B2D18;   --lv-low-fg: #EFC88A;
    --bg: #101019; --bg-elev: #1A1A27;
    --surface: #1E1E2C; --surface-2: #252536; --surface-3: #2E2E41;
    --divider: #2E2E41; --divider-strong: #3E3E55;
    --text: #F2F2F7; --text-muted: #9A9AAF; --text-faint: #66667A;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    --shadow-md: 0 2px 10px rgba(0,0,0,0.35), 0 1px 3px rgba(0,0,0,0.25);
    --shadow-lg: 0 8px 28px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Helvetica Neue', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  font-feature-settings: "palt"; -webkit-font-smoothing: antialiased;
}
body {
  background:
    radial-gradient(1200px 600px at 50% -10%, rgba(107,95,232,0.14) 0%, transparent 60%),
    radial-gradient(800px 400px at 100% 20%, rgba(230,106,62,0.06) 0%, transparent 60%),
    var(--bg);
  background-attachment: fixed;
  padding-bottom: calc(80px + var(--safe-bottom));
}
@media (prefers-color-scheme: dark) {
  body {
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(107,95,232,0.18) 0%, transparent 60%),
      radial-gradient(800px 400px at 100% 20%, rgba(230,106,62,0.08) 0%, transparent 60%),
      var(--bg);
  }
}

.wrap { max-width: 520px; margin: 0 auto; padding: calc(var(--safe-top) + 16px) 16px 24px; }

.app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.app-title { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; color: var(--text); display: flex; align-items: center; gap: 8px; }
.app-title .logo-ball {
  width: 28px; height: 28px; border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #D7F77A 0%, #A7D943 70%, #7DAE29 100%);
  box-shadow: inset -3px -4px 6px rgba(0,0,0,0.15), 0 2px 8px rgba(122,167,32,0.35);
  position: relative;
}
.app-title .logo-ball::before, .app-title .logo-ball::after {
  content: ''; position: absolute; inset: 0; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.7);
  clip-path: ellipse(18px 9px at 14px 2px);
}
.app-title .logo-ball::after { clip-path: ellipse(18px 9px at 14px 26px); }
.app-subtitle { font-size: 12px; color: var(--text-muted); font-weight: 500; }

.section { display: none; animation: sectionIn 0.35s var(--ease-out) both; }
.section.visible { display: block; }
@keyframes sectionIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.input-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
input[type=text], input[type=number], select, textarea {
  font-family: inherit; background: var(--surface); color: var(--text);
  border: 1px solid var(--divider-strong); border-radius: var(--radius);
  outline: none; -webkit-appearance: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
input[type=text] { flex: 1; padding: 12px 14px; font-size: 16px; }
input[type=number] { width: 72px; padding: 12px 8px; font-size: 14px; text-align: center; }
select { padding: 12px 10px; font-size: 14px; width: 84px; text-align: center; background-image: none; }
input:focus, select:focus, textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 4px rgba(107,95,232,0.15); }

.add-btn {
  width: 44px; height: 44px; border-radius: var(--radius); border: none; cursor: pointer; flex-shrink: 0;
  background: var(--brand-grad); color: white; font-size: 24px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px rgba(107,95,232,0.35); transition: transform 0.15s, box-shadow 0.15s;
}
.add-btn:active { transform: scale(0.92); box-shadow: 0 2px 6px rgba(107,95,232,0.35); }

.hint { font-size: 12px; color: var(--text-faint); margin: 2px 0 14px; }
.section-label { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.02em; margin-bottom: 8px; }

.count-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.count-info { font-size: 13px; color: var(--text-muted); font-weight: 500; }
.count-info b { color: var(--text); font-weight: 700; }
.select-all-btn { font-size: 13px; font-weight: 700; color: var(--brand); background: var(--brand-soft); border: none; border-radius: 100px; padding: 7px 14px; cursor: pointer; font-family: inherit; transition: transform 0.1s; }
.select-all-btn:active { transform: scale(0.95); }

/* Lv Badge */
.badge { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 100px; letter-spacing: 0.03em; }
.badge-lv-low  { background: var(--lv-low-bg);   color: var(--lv-low-fg); }
.badge-lv-mid  { background: var(--lv-mid-bg);   color: var(--lv-mid-fg); }
.badge-lv-high { background: var(--lv-upper-bg); color: var(--lv-upper-fg); }

/* Lv mini bar */
.lv-bar-wrap { display: flex; align-items: center; gap: 5px; }
.lv-bar-outer { flex: 1; height: 4px; background: var(--surface-3); border-radius: 3px; overflow: hidden; min-width: 50px; }
.lv-bar-inner { height: 100%; border-radius: 3px; transition: width 0.5s var(--ease-out); }

.player-tag {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; background: var(--surface); border-radius: var(--radius);
  margin-bottom: 8px; box-shadow: var(--shadow-sm); border: 1px solid var(--divider);
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
}
.player-tag:active { transform: scale(0.99); }
.player-info { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex: 1; min-width: 0; }
.player-info > span:first-of-type { font-weight: 600; font-size: 15px; color: var(--text); }

.avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid var(--surface); box-shadow: 0 0 0 1.5px var(--divider-strong); object-position: center 20%; animation: avatarPop 0.45s var(--ease-bounce) both; transition: transform 0.25s var(--ease-out), box-shadow 0.25s var(--ease-out); position: relative; z-index: 1; cursor: pointer; }
.avatar:hover { transform: scale(4.5); z-index: 200; box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 0 2.5px var(--brand); }
.avatar-placeholder { width: 36px; height: 36px; border-radius: 50%; background: var(--surface-3); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; color: var(--text-faint); border: 2px solid var(--surface); box-shadow: 0 0 0 1.5px var(--divider-strong); }
@keyframes avatarPop { 0% { transform: scale(0); opacity: 0; } 65% { transform: scale(1.25); opacity: 1; } 100% { transform: scale(1); } }
.face-zoom { background-repeat: no-repeat; }

.photo-upload-label { font-size: 12px; font-weight: 700; color: var(--brand); background: var(--brand-soft); border: none; border-radius: 100px; padding: 7px 14px; cursor: pointer; white-space: nowrap; font-family: inherit; display: inline-flex; align-items: center; gap: 4px; }

.tag-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.edit-btn { font-size: 12px; font-weight: 600; color: var(--brand); background: transparent; border: 1px solid var(--divider-strong); border-radius: 100px; padding: 6px 12px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
.edit-btn:active { background: var(--brand-soft); }
.remove-btn { background: transparent; border: none; cursor: pointer; color: var(--text-faint); font-size: 22px; padding: 0 4px; line-height: 1; transition: color 0.15s; }
.remove-btn:active { color: var(--danger); }

.edit-row { display: none; padding: 14px; background: var(--surface-2); border-radius: 0 0 var(--radius) var(--radius); margin-top: -8px; margin-bottom: 8px; border: 1px solid var(--divider); border-top: none; animation: editOpen 0.25s var(--ease-out); }
.edit-row.open { display: block; }
@keyframes editOpen { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
.edit-row input[type=text] { flex: 1; font-size: 14px; padding: 10px 12px; }
.edit-row input[type=number] { width: 76px; font-size: 13px; padding: 10px 6px; }

.save-btn { padding: 10px 16px; font-size: 13px; font-weight: 700; background: var(--brand-grad); color: white; border: none; border-radius: var(--radius); cursor: pointer; font-family: inherit; white-space: nowrap; box-shadow: 0 2px 8px rgba(107,95,232,0.3); transition: transform 0.1s; }
.save-btn:active { transform: scale(0.96); }

.check-circle { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--divider-strong); background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; color: transparent; transition: all 0.2s var(--ease-bounce); }
.check-circle.checked { background: var(--brand-grad); border-color: var(--brand); color: white; box-shadow: 0 2px 8px rgba(107,95,232,0.4); }

.court-toggle, .mode-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
.toggle-btn { flex: 1; padding: 11px 8px; font-size: 13px; font-weight: 600; background: var(--surface); border: 1.5px solid var(--divider-strong); border-radius: var(--radius); color: var(--text-muted); cursor: pointer; font-family: inherit; transition: all 0.15s; }
.toggle-btn.active { border-color: var(--brand); color: var(--brand); background: var(--brand-soft); font-weight: 700; }
.toggle-btn:active { transform: scale(0.98); }

.mode-btn { flex: 1; padding: 14px 10px; font-size: 14px; font-weight: 700; background: var(--surface); border: 1.5px solid var(--divider-strong); border-radius: var(--radius-lg); color: var(--text-muted); cursor: pointer; font-family: inherit; line-height: 1.4; position: relative; transition: all 0.18s var(--ease); }
.mode-btn .mode-sub { font-size: 10.5px; font-weight: 500; color: var(--text-faint); display: block; margin-top: 3px; }
.mode-btn:active { transform: scale(0.97); }
.mode-btn.active.random { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); box-shadow: 0 4px 14px rgba(216,90,48,0.18); }
.mode-btn.active.random .mode-sub { color: var(--accent); opacity: 0.75; }
.mode-btn.active.balance { border-color: var(--brand); color: var(--brand); background: var(--brand-soft); box-shadow: 0 4px 14px rgba(107,95,232,0.18); }
.mode-btn.active.balance .mode-sub { color: var(--brand); opacity: 0.75; }

.action-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 700; background: var(--surface); border: 1px solid var(--divider-strong); border-radius: var(--radius-lg); color: var(--text); cursor: pointer; margin-bottom: 10px; font-family: inherit; transition: transform 0.1s, box-shadow 0.15s; }
.action-btn:active { transform: scale(0.99); opacity: 0.9; }
.action-btn.primary { background: var(--brand-grad); border: none; color: white; box-shadow: 0 6px 18px rgba(107,95,232,0.35); letter-spacing: 0.02em; }
.action-btn.primary:active { box-shadow: 0 3px 10px rgba(107,95,232,0.3); }
.action-btn.primary.random-mode { background: var(--accent-grad); box-shadow: 0 6px 18px rgba(216,90,48,0.35); }

.results { margin-top: 18px; }
.round-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
.round-label { font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: -0.01em; }
.mode-label { font-size: 10.5px; font-weight: 700; padding: 3px 10px; border-radius: 100px; letter-spacing: 0.02em; }
.mode-label.random { background: var(--accent-soft); color: var(--accent-deep); }
.mode-label.balance { background: var(--brand-soft); color: var(--brand-deep); }
.queue-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px; background: var(--accent-soft); color: var(--accent-deep); }

.next-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; font-size: 14px; font-weight: 700; background: var(--brand-grad); border: none; border-radius: 100px; color: white; cursor: pointer; font-family: inherit; box-shadow: 0 4px 12px rgba(107,95,232,0.3); transition: transform 0.1s; }
.next-btn:active { transform: scale(0.96); }
.next-btn.random-mode { background: var(--accent-grad); box-shadow: 0 4px 12px rgba(216,90,48,0.3); }

.court-card { background: var(--surface); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow-md); border: 1px solid var(--divider); animation: cardPop 0.35s var(--ease-out) both; }
.court-card:nth-child(2) { animation-delay: 0.05s; }
.court-card:nth-child(3) { animation-delay: 0.1s; }
@keyframes cardPop { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: none; } }

.court-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.court-title-group { display: flex; align-items: center; gap: 8px; }
.court-num { font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 6px; background: var(--brand-grad); color: white; letter-spacing: 0.05em; }
.balance-pill { font-size: 11px; font-weight: 500; color: var(--text-muted); }

.type-seg { display: flex; background: var(--surface-3); border-radius: 100px; padding: 3px; }
.type-seg button { padding: 4px 10px; font-size: 10.5px; font-weight: 700; border: none; cursor: pointer; font-family: inherit; background: transparent; color: var(--text-muted); border-radius: 100px; transition: all 0.15s; }
.type-seg button.active { background: var(--surface); color: var(--brand); box-shadow: var(--shadow-sm); }

.teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; margin-bottom: 14px; }
.team { display: flex; flex-direction: column; gap: 8px; }
.team-player { display: flex; align-items: center; gap: 7px; font-size: 14px; color: var(--text); }
.team-right { align-items: flex-end; }
.vs { font-size: 12px; font-weight: 800; color: var(--text-faint); text-align: center; letter-spacing: 0.05em; padding: 4px 8px; border-radius: 100px; background: var(--surface-3); }

.wait-card { background: var(--surface-2); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; font-size: 13px; color: var(--text-muted); border: 1px dashed var(--divider-strong); }
.wait-card b { color: var(--text); font-weight: 700; }

.empty { font-size: 14px; color: var(--text-muted); text-align: center; padding: 3rem 1rem; background: var(--surface); border-radius: var(--radius-lg); border: 1px dashed var(--divider-strong); }
.empty .empty-icon { font-size: 40px; margin-bottom: 8px; display: block; opacity: 0.6; }
.empty-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 4px; }

.result-btns { display: flex; gap: 8px; }
.result-btn { flex: 1; padding: 10px 8px; font-size: 13px; font-weight: 700; border-radius: var(--radius); border: 1.5px solid var(--divider-strong); background: var(--surface); cursor: pointer; font-family: inherit; color: var(--text-muted); transition: all 0.15s; }
.result-btn:active { transform: scale(0.97); }
.result-btn.win  { border-color: var(--brand); background: var(--brand-grad); color: white; box-shadow: 0 4px 10px rgba(107,95,232,0.3); }
.result-btn.lose { border-color: var(--divider); background: var(--surface-2); color: var(--text-faint); }

.delta-row { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--divider); font-size: 12px; color: var(--text-muted); line-height: 1.7; }
.delta-plus  { color: var(--success-deep); font-weight: 700; }
.delta-minus { color: var(--accent-deep);  font-weight: 700; }
@media (prefers-color-scheme: dark) {
  .delta-plus  { color: #8AE0B9; }
  .delta-minus { color: #F5A98A; }
}

/* Rankings */
.rtab-switch { display: flex; background: var(--surface-3); border-radius: 100px; padding: 4px; margin-bottom: 16px; }
.rtab-switch button { flex: 1; padding: 9px; font-size: 13px; font-weight: 700; border: none; cursor: pointer; font-family: inherit; background: transparent; color: var(--text-muted); border-radius: 100px; transition: all 0.2s; }
.rtab-switch button.active { background: var(--surface); color: var(--brand); box-shadow: var(--shadow-sm); }

.rank-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface); border-radius: var(--radius-lg); margin-bottom: 8px; border: 1px solid var(--divider); box-shadow: var(--shadow-sm); }
.rank-row.top1 { background: linear-gradient(135deg, #FFF9E1 0%, #FFE7A0 100%); border-color: #F5C14E; box-shadow: 0 4px 18px rgba(240,165,0,0.18); }
.rank-row.top2 { background: linear-gradient(135deg, #F4F4F7 0%, #DCDCE5 100%); border-color: #B8B8C5; }
.rank-row.top3 { background: linear-gradient(135deg, #FBEEE0 0%, #F0D2B0 100%); border-color: #D4A373; }
@media (prefers-color-scheme: dark) {
  .rank-row.top1 { background: linear-gradient(135deg, #3B3012 0%, #5A4418 100%); border-color: #8A6E20; }
  .rank-row.top2 { background: linear-gradient(135deg, #2A2A38 0%, #383849 100%); border-color: #5A5A70; }
  .rank-row.top3 { background: linear-gradient(135deg, #3B2718 0%, #55381F 100%); border-color: #8B5E32; }
}
.rank-num { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; flex-shrink: 0; background: var(--surface-3); color: var(--text-muted); }
.rank-num.gold   { background: linear-gradient(135deg, #FFD966 0%, #F0A500 100%); color: white; box-shadow: 0 3px 10px rgba(240,165,0,0.4); }
.rank-num.silver { background: linear-gradient(135deg, #D0D0D8 0%, #8E8E9A 100%); color: white; box-shadow: 0 3px 10px rgba(150,150,170,0.4); }
.rank-num.bronze { background: linear-gradient(135deg, #E6A373 0%, #B76E3A 100%); color: white; box-shadow: 0 3px 10px rgba(180,110,58,0.4); }
.rank-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid var(--surface); box-shadow: 0 0 0 1.5px var(--divider-strong); object-position: center 20%; animation: avatarPop 0.45s var(--ease-bounce) both; transition: transform 0.25s var(--ease-out), box-shadow 0.25s var(--ease-out); position: relative; z-index: 1; cursor: pointer; }
.rank-avatar:hover { transform: scale(4); z-index: 200; box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 0 2.5px var(--brand); }
.rank-avatar-ph { width: 44px; height: 44px; border-radius: 50%; background: var(--surface-3); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; border: 2px solid var(--surface); box-shadow: 0 0 0 1.5px var(--divider-strong); }
.rank-body { flex: 1; min-width: 0; }
.rank-name-line { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.rank-name { font-size: 15px; font-weight: 700; color: var(--text); }
.rank-bar-outer { height: 5px; background: var(--surface-3); border-radius: 3px; overflow: hidden; }
.rank-bar-inner { height: 100%; border-radius: 3px; transition: width 0.6s var(--ease-out); }
.rank-bar-inner.brand { background: var(--brand-grad); }
.rank-bar-inner.plus  { background: linear-gradient(90deg, #10A375, #34C38F); }
.rank-bar-inner.minus { background: linear-gradient(90deg, #E05A30, #F59063); }
.rank-score { text-align: right; flex-shrink: 0; min-width: 60px; }
.rank-score-num { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1.1; letter-spacing: -0.02em; }
.rank-score-num .unit { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-left: 1px; }
.rank-score-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.lv-divider { font-size: 11px; font-weight: 700; color: var(--text-muted); margin: 16px 0 8px 2px; display: flex; align-items: center; gap: 8px; }
.lv-divider .line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--divider) 0%, transparent 100%); }

/* Bottom tab bar */
.bottom-tabs { position: fixed; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.85); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-top: 1px solid var(--divider); padding: 6px 8px calc(6px + var(--safe-bottom)); display: flex; z-index: 100; }
@media (prefers-color-scheme: dark) { .bottom-tabs { background: rgba(20,20,32,0.85); } }
.bottom-tab { flex: 1; border: none; background: transparent; cursor: pointer; font-family: inherit; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--text-faint); font-size: 10.5px; font-weight: 600; transition: color 0.15s; }
.bottom-tab svg { width: 24px; height: 24px; transition: transform 0.2s var(--ease-bounce); }
.bottom-tab.active { color: var(--brand); }
.bottom-tab.active svg { transform: translateY(-1px) scale(1.08); }
.bottom-tab:active { opacity: 0.6; }

/* Import/export */
.io-box { background: var(--surface); border-radius: var(--radius-lg); padding: 14px; border: 1px solid var(--divider); margin-top: 16px; }
.io-msg { font-size: 12px; color: var(--brand); text-align: center; margin-top: 8px; min-height: 18px; font-weight: 600; }
#importArea { margin-top: 10px; }
#importText { width: 100%; height: 84px; padding: 12px; font-size: 13px; resize: none; line-height: 1.5; }

/* VS Overlay */
#imgModal { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px; cursor: pointer; animation: imgModalIn 0.2s ease-out both; }
#imgModal.open { display: flex; }
#imgModal img { max-width: 92vw; max-height: 85vh; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.7); cursor: default; animation: imgModalScale 0.25s cubic-bezier(0.34,1.56,0.64,1) both; }
#imgModal .img-modal-name { color: #fff; font-size: 16px; font-weight: 700; letter-spacing: 0.05em; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
#imgModal .img-modal-close { position: absolute; top: 16px; right: 20px; color: rgba(255,255,255,0.7); font-size: 28px; line-height: 1; cursor: pointer; }
@keyframes imgModalIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes imgModalScale { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
#vsOverlay { position: fixed; inset: 0; z-index: 9999; background: #07071a; display: none; flex-direction: column; align-items: stretch; overflow: hidden; cursor: pointer; }
.vs-rays { position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; background: repeating-conic-gradient(rgba(255,255,255,0.018) 0deg 2.5deg, transparent 2.5deg 5deg); animation: vsRaysSpin 40s linear infinite; pointer-events: none; }
.vs-split-left  { position: absolute; left: 0; top: 0; width: 50%; height: 100%; background: linear-gradient(to right, rgba(20,50,210,0.45), transparent); pointer-events: none; }
.vs-split-right { position: absolute; right: 0; top: 0; width: 50%; height: 100%; background: linear-gradient(to left, rgba(210,30,30,0.45), transparent); pointer-events: none; }
.vs-flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; animation: vsFlashAnim 0.5s 0.42s ease-out forwards; }
.vs-courts-wrap { position: relative; z-index: 1; width: 100%; height: 100%; display: flex; flex-direction: column; }
.vs-court-section { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.vs-court-label { font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.55); letter-spacing: 2px; text-align: center; padding: 8px 0 0; flex-shrink: 0; }
.vs-divider { width: 80%; height: 1px; background: rgba(255,255,255,0.15); margin: 0 auto; }
.vs-smash-row { flex: 1; display: flex; position: relative; min-height: 0; }
.vs-char-half { flex: 1; display: flex; flex-direction: row; align-items: stretch; justify-content: center; overflow: hidden; padding: 0 4px 48px; gap: 4px; }
.vs-char-half.left  { animation: vsSlideLeft  0.4s cubic-bezier(0.15,0,0,1) both; }
.vs-char-half.right { animation: vsSlideRight 0.4s cubic-bezier(0.15,0,0,1) 0.05s both; }
.vs-char-slot { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 0; }
.vs-char-art { width: 100%; flex: 1; object-fit: contain; object-position: bottom center; min-height: 0; filter: drop-shadow(0 6px 28px rgba(0,0,0,0.9)); }
.vs-char-art-bg { flex: 1; width: 100%; background-repeat: no-repeat; background-size: 210% auto; background-position: 100% 5%; }
.vs-char-emoji { flex: 1; display: flex; align-items: flex-end; justify-content: center; font-size: 80px; padding-bottom: 8px; }
.vs-char-name { font-weight: 900; color: #fff; font-size: 16px; text-shadow: 0 0 12px rgba(255,255,255,0.9), 2px 2px 0 rgba(0,0,0,0.9); white-space: nowrap; text-align: center; animation: vsNameIn 0.3s 0.2s ease-out both; margin-top: 4px; }
.vs-char-lv { font-size: 11px; font-weight: 800; padding: 2px 10px; border-radius: 20px; color: white; display: inline-block; margin-top: 2px; }
.vs-smash-center { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; }
.vs-vs { font-size: 56px; font-weight: 900; line-height: 1; color: #FFD700; letter-spacing: -2px; text-shadow: 0 0 8px #FF8C00, 0 0 24px #FF4500, 0 0 52px rgba(255,69,0,0.5), 3px 3px 0 #7a0000; animation: vsBounce 0.52s 0.44s cubic-bezier(0.15,0,0,1) both; }
.vs-vs.small { font-size: 36px; }
.vs-hint { position: absolute; bottom: 14px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.35); font-size: 12px; animation: vsFadeIn 0.6s 1.2s ease-out both; z-index: 20; pointer-events: none; }
.vs-anim-btn { width: 100%; padding: 12px; font-size: 13px; font-weight: 800; background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 100%); color: #d9ccff; border: 1.5px solid var(--brand); border-radius: var(--radius); cursor: pointer; font-family: inherit; letter-spacing: 0.08em; }
.vs-anim-btn:active { opacity: 0.8; }
.vs-toggle-btn { padding: 12px 16px; font-size: 12px; font-weight: 800; border-radius: var(--radius); cursor: pointer; font-family: inherit; white-space: nowrap; border: 1.5px solid; transition: all 0.2s; }
.vs-toggle-btn.on  { background: linear-gradient(135deg, #1e3a1e 0%, #1a4a1a 100%); color: #7eff7e; border-color: #4caf50; }
.vs-toggle-btn.off { background: linear-gradient(135deg, #2a1a1a 0%, #3a1a1a 100%); color: #aaa; border-color: #555; }
.vs-toggle-btn:active { opacity: 0.75; }
@keyframes vsSlideLeft  { from { transform: translateX(-60vw); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes vsSlideRight { from { transform: translateX(60vw);  opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes vsBounce { 0% { transform: scale(0) rotate(-18deg); opacity: 0; } 55% { transform: scale(1.4) rotate(5deg); opacity: 1; } 75% { transform: scale(0.9) rotate(-2deg); } 100% { transform: scale(1) rotate(0); } }
@keyframes vsFlashAnim  { 0% { opacity: 0.55; } 100% { opacity: 0; } }
@keyframes vsRaysSpin   { to { transform: rotate(360deg); } }
@keyframes vsNameIn     { from { transform: translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }
@keyframes vsFadeIn     { from { opacity: 0; } to { opacity: 0.35; } }

/* Misc */
.photo-preview-lg { width: 48px; height: 48px; }
.flex-row { display: flex; align-items: center; gap: 10px; }
.flex-col { display: flex; flex-direction: column; gap: 10px; }
.gap-8 { gap: 8px; }
</style>

<body>
<div class="wrap">
  <div class="app-header">
    <div class="app-title"><span class="logo-ball"></span>テニス組み分け</div>
    <div class="app-subtitle" id="headerSubtitle"></div>
  </div>

  <!-- メンバー管理 -->
  <div class="section visible" id="tab-members">
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="名前を入力" />
      <input type="number" id="lvInput" min="1" max="100" value="50" placeholder="Lv" />
      <button class="add-btn" onclick="addMember()" aria-label="追加">+</button>
    </div>
    <div class="hint">⚡ Lv.1〜100 でレベルを設定（ポケモン方式）</div>
    <div class="count-info" id="memberCount">登録メンバー <b>0</b>人</div>
    <div id="memberList" style="margin-top:10px;">
      <div class="empty"><span class="empty-icon">👥</span><div class="empty-title">メンバーを登録してください</div><div>上のフォームから追加できます</div></div>
    </div>
    <div class="io-box">
      <div class="section-label">データのバックアップ</div>
      <button class="action-btn" onclick="exportData()" style="display:flex;align-items:center;justify-content:center;gap:8px;">📤 データをコピーして保存</button>
      <button class="action-btn" onclick="showImport()" style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:0;">📥 保存データを読み込む</button>
      <div class="io-msg" id="shareMsg"></div>
      <div id="importArea" style="display:none;">
        <textarea id="importText" placeholder="ここにコピーしたデータを貼り付け"></textarea>
        <button class="action-btn primary" onclick="importData()" style="margin-top:8px;margin-bottom:0;">読み込む</button>
      </div>
    </div>
  </div>

  <!-- ランキング -->
  <div class="section" id="tab-ranking">
    <div class="rtab-switch">
      <button id="rtab-overall" class="active" onclick="showRankingTab('overall')">総合</button>
      <button id="rtab-today" onclick="showRankingTab('today')">今日の試合</button>
    </div>
    <div id="rankingList"></div>
    <div id="rankingTodayList" style="display:none;"></div>
  </div>

  <!-- 今日の試合 -->
  <div class="section" id="tab-match">
    <div class="count-row">
      <div class="count-info"><b id="selectedCountNum">0</b>人選択中<span style="font-weight:400;color:var(--text-faint);"> （タップで参加・不参加）</span></div>
      <button class="select-all-btn" id="selectAllBtn" onclick="toggleSelectAll()">全選択</button>
    </div>
    <div id="todayList"></div>
    <div style="margin-top:1.25rem;">
      <div class="section-label">コート数</div>
      <div class="court-toggle">
        <button class="toggle-btn active" id="btn-auto" onclick="setMode('auto')">自動</button>
        <button class="toggle-btn" id="btn-1" onclick="setMode('1')">1コート</button>
        <button class="toggle-btn" id="btn-2" onclick="setMode('2')">2コート</button>
      </div>
      <div class="section-label">組み分け方法</div>
      <div class="mode-toggle">
        <button class="mode-btn random" id="modeRandom" onclick="setMatchMode('random')">
          🎲 ランダム
          <span class="mode-sub">未経験ペアを順番に消化</span>
        </button>
        <button class="mode-btn balance active" id="modeBalance" onclick="setMatchMode('balance')">
          ⚖️ バランス
          <span class="mode-sub">強さ均等＋5回ルール</span>
        </button>
      </div>
      <button class="action-btn primary" id="generateBtn" onclick="generateMatch(true)">組み分けする</button>
      <div class="results" id="results"></div>
    </div>
  </div>
</div>

<!-- Bottom Tab Bar -->
<nav class="bottom-tabs" aria-label="メインナビゲーション">
  <button class="bottom-tab active" data-tab="members" onclick="showTab('members')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="4"/><path d="M3 21c0-3.314 2.686-6 6-6s6 2.686 6 6"/><circle cx="17" cy="9" r="3"/><path d="M15 21c0-2.21 1.343-4.5 4-4.5s4 2.29 4 4.5"/></svg>
    メンバー
  </button>
  <button class="bottom-tab" data-tab="match" onclick="showTab('match')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3.6 9h16.8M3.6 15h16.8M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
    試合
  </button>
  <button class="bottom-tab" data-tab="ranking" onclick="showTab('ranking')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4h10v5a5 5 0 0 1-10 0V4z"/><path d="M7 4H4v2a3 3 0 0 0 3 3"/><path d="M17 4h3v2a3 3 0 0 1-3 3"/><path d="M10 14h4l-1 4h-2l-1-4z"/><path d="M7 20h10"/></svg>
    ランキング
  </button>
</nav>

<div id="vsOverlay" onclick="closeVsOverlay()"></div>
<div id="imgModal" onclick="closeImgModal()">
  <span class="img-modal-close" onclick="closeImgModal()">✕</span>
  <img id="imgModalImg" src="" alt="" onclick="event.stopPropagation()"/>
  <div class="img-modal-name" id="imgModalName"></div>
</div>

  if (lv >= 67) return { cls: 'badge-lv-high', solid: '#6B5FE8', bar: 'var(--brand-grad)' };

  return             { cls: 'badge-lv-low',  solid: '#C48530', bar: 'linear-gradient(90deg,#C48530,#E8AA50)' };
}
function lvBadge(lv) {
  const c = lvColor(lv);
  return `<span class="badge ${c.cls}">Lv.${lv}</span>`;
}

function showRankingTab(tab) {
  document.getElementById('rtab-overall').classList.toggle('active', tab === 'overall');
  document.getElementById('rtab-today').classList.toggle('active', tab === 'today');
  document.getElementById('rankingList').style.display       = tab === 'overall' ? 'block' : 'none';
  document.getElementById('rankingTodayList').style.display  = tab === 'today'   ? 'block' : 'none';
  if (tab === 'today') renderTodayRanking();
}

function renderTodayRanking() {
  const list = document.getElementById('rankingTodayList');
  if (!matchHistory.length) {
    list.innerHTML = '<div class="empty"><span class="empty-icon">🎾</span><div class="empty-title">まだ試合がありません</div><div>試合タブで組み分けをすると表示されます</div></div>';
    return;
  }
  const deltaMap = {};
  matchHistory.forEach(round => {
    if (!round.changes) return;
    Object.values(round.changes).forEach(changes => {
      changes.forEach(ch => {
        if (!deltaMap[ch.name]) deltaMap[ch.name] = { name: ch.name, total: 0 };
        deltaMap[ch.name].total += ch.delta;
      });
    });
  });
  const entries = Object.values(deltaMap).sort((a, b) => b.total - a.total);
  if (!entries.length) {
    list.innerHTML = '<div class="empty"><span class="empty-icon">🏆</span><div class="empty-title">まだ勝敗が入力されていません</div></div>';
    return;
  }
  const maxAbs = Math.max(...entries.map(e => Math.abs(e.total))) || 1;
  let html = '<div style="font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:12px;padding:0 4px;">本日のLv変動合計</div>';
  entries.forEach((e, i) => {
    const isPlus = e.total >= 0;
    const barCls = isPlus ? 'plus' : 'minus';
    const barW   = Math.round((Math.abs(e.total) / maxAbs) * 100);
    const sign   = isPlus ? '＋' : '−';
    const m      = members.find(x => x.name === e.name);
    const rfc    = m && FACE_CONFIGS[m.photo];
    const av     = rfc
      ? `<div class="rank-avatar face-zoom" style="background-image:url('${m.photo}');background-size:${rfc.size};background-position:${rfc.pos};"></div>`
      : m && m.photo ? `<img class="rank-avatar" src="${m.photo}" alt="">` : `<div class="rank-avatar-ph">👤</div>`;
    const lvTag  = m ? lvBadge(m.lv) : '';
    const rnkCls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const rowCls = i === 0 ? 'top1' : i === 1 ? 'top2'   : i === 2 ? 'top3'   : '';
    html += `<div class="rank-row ${rowCls}">
      <div class="rank-num ${rnkCls}">${i + 1}</div>${av}
      <div class="rank-body">
        <div class="rank-name-line"><span class="rank-name">${e.name}</span>${lvTag}</div>
        <div class="rank-bar-outer"><div class="rank-bar-inner ${barCls}" style="width:${barW}%;"></div></div>
      </div>
      <div class="rank-score">
        <div class="rank-score-num" style="color:${isPlus ? 'var(--success-deep)' : 'var(--accent-deep)'};">${sign}${Math.abs(e.total)}<span class="unit">Lv</span></div>
      </div>
    </div>`;
  });
  list.innerHTML = html;
}

function renderRanking() {
  const list = document.getElementById('rankingList');
  if (!members.length) { list.innerHTML = '<div class="empty"><span class="empty-icon">👤</span><div class="empty-title">メンバーを登録してください</div></div>'; return; }
  const sorted = [...members].sort((a, b) => b.lv - a.lv);
  const maxLv  = sorted[0]?.lv || 100;
  const tiers  = [
    { min: 67, max: 100, label: '上級', key: 'high' },
    { min: 34, max: 66,  label: '中級', key: 'mid'  },
    { min: 1,  max: 33,  label: '初級', key: 'low'  },
  ];
  let html = '', rank = 1;
  tiers.forEach(tier => {
    const group = sorted.filter(m => m.lv >= tier.min && m.lv <= tier.max);
    if (!group.length) return;
    const c = lvColor(tier.min + 1);
    html += `<div class="lv-divider"><span class="badge ${c.cls}">Lv.${tier.min}〜${tier.max}　${tier.label}</span><span class="line"></span></div>`;
    group.forEach((m, gi) => {
      const r      = rank + gi;
      const barW   = Math.round((m.lv / maxLv) * 100);
      const rfc2   = FACE_CONFIGS[m.photo];
      const av     = rfc2
        ? `<div class="rank-avatar face-zoom" style="background-image:url('${m.photo}');background-size:${rfc2.size};background-position:${rfc2.pos};"></div>`
        : m.photo ? `<img class="rank-avatar" src="${m.photo}" alt="">` : `<div class="rank-avatar-ph">👤</div>`;
      const rnkCls = r === 1 ? 'gold' : r === 2 ? 'silver' : r === 3 ? 'bronze' : '';
      const rowCls = r === 1 ? 'top1' : r === 2 ? 'top2'   : r === 3 ? 'top3'   : '';
      html += `<div class="rank-row ${rowCls}">
        <div class="rank-num ${rnkCls}">${r}</div>${av}
        <div class="rank-body">
          <div class="rank-name-line"><span class="rank-name">${m.name}</span></div>
          <div class="rank-bar-outer"><div class="rank-bar-inner brand" style="width:${barW}%;"></div></div>
        </div>
        <div class="rank-score">
          <div class="rank-score-num">${m.lv}<span class="unit">Lv</span></div>
          <div class="rank-score-sub">${tier.label}</div>
        </div>
      </div>`;
    });
    rank += group.length;
  });
  list.innerHTML = html;
}

   ========================================== */
function load() {
  try {
    const d5 = localStorage.getItem('tennis_data5');
    if (d5) {
      const p = JSON.parse(d5);
      members       = p.members       || [];
      nextId        = p.nextId        || 0;
      pairCount     = p.pairCount     || {};
      teamPairCount = p.teamPairCount || {};
    }
    // tennis_data5がない、またはmembersが空の場合は旧データ or デフォルトから復元
    if (!members.length) {
      const d4 = localStorage.getItem('tennis_data4');
      if (d4) {
        const p   = JSON.parse(d4);
        const lvMap = { '上級': [67, 100], '中級': [34, 66], '初級': [1, 33] };
        members = (p.members || []).map(m => {
          const range = lvMap[m.level] || [34, 66];
          const lv    = Math.round(range[0] + ((m.score || 50) - 1) / 99 * (range[1] - range[0]));
          return { id: m.id, name: m.name, lv: Math.min(100, Math.max(1, lv)), photo: m.photo };
        });
        nextId        = p.nextId    || 0;
        pairCount     = p.pairCount || {};
        teamPairCount = {};
      }
      if (!members.length) {
        members = DEFAULT_MEMBERS.map(m => ({ id: nextId++, name: m.name, lv: m.lv, photo: m.photo }));
      }
      save();
    }
    // キャラクター画像を常に最新のものに更新
    const photoMap = { 'なみ': 'characters/nami.png', 'ともちん': 'characters/tomoching.png', '坂井': 'characters/sakai.png', 'ゆみ': 'characters/yumi.png', '朝日': 'characters/asahi.png', 'さとし': 'characters/satoshi.png', 'あかり': 'characters/akari.png', 'のの': 'characters/nono.png', '花井': 'characters/hanai.png' };
    let updated = false;
    members.forEach(m => { if (photoMap[m.name]) { m.photo = photoMap[m.name]; updated = true; } });
    if (updated) save();
  } catch (e) {}
  renderMembers();
  renderToday();
}

function save() {
  try { localStorage.setItem('tennis_data5', JSON.stringify({ members, nextId, pairCount, teamPairCount })); } catch (e) {}
}

function exportData() {
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify({ members, nextId, pairCount, teamPairCount }))));
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(encoded)
      .then(() => showShareMsg('✅ コピーしました！メモ帳などに貼り付けて保存してください'))
      .catch(() => fallbackCopy(encoded));
  } else { fallbackCopy(encoded); }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); showShareMsg('✅ コピーしました！'); } catch (e) { showShareMsg('コピーできませんでした'); }
  document.body.removeChild(ta);
}
function showImport() { const a = document.getElementById('importArea'); a.style.display = a.style.display === 'none' ? 'block' : 'none'; }
function importData() {
  const text = document.getElementById('importText').value.trim();
  if (!text) { showShareMsg('❌ データを貼り付けてください'); return; }
  try {
    const p = JSON.parse(decodeURIComponent(escape(atob(text))));
    if (!p.members) throw new Error();
    members = p.members; nextId = p.nextId || 0; pairCount = p.pairCount || {}; teamPairCount = p.teamPairCount || {};
    save();
    document.getElementById('importText').value = '';
    document.getElementById('importArea').style.display = 'none';
    showShareMsg('✅ データを読み込みました！');
    renderMembers(); renderToday();
  } catch (e) { showShareMsg('❌ データが正しくありません'); }
}
function showShareMsg(msg) { const el = document.getElementById('shareMsg'); el.textContent = msg; setTimeout(() => el.textContent = '', 4000); }

function handlePhotoChange(id, input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    pendingPhotos[id] = e.target.result;
    const prev = document.getElementById('photo-preview-' + id);
    const ph   = document.getElementById('photo-placeholder-' + id);
    if (prev) { prev.src = e.target.result; prev.style.display = 'block'; }
    if (ph)   ph.style.display = 'none';
  };
  reader.readAsDataURL(file);
}

/* ==========================================
   メンバー管理
   ========================================== */
function addMember() {
  const ni = document.getElementById('nameInput');
  const name = ni.value.trim(); if (!name) { ni.focus(); return; }
  members.push({ id: nextId++, name, lv: clampLv(document.getElementById('lvInput').value) });
  ni.value = ''; document.getElementById('lvInput').value = 50; ni.focus();
  save(); renderMembers(); updateHeaderSubtitle();
}
document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') addMember(); });

function removeMember(id) { members = members.filter(m => m.id !== id); selected.delete(id); save(); renderMembers(); renderToday(); updateHeaderSubtitle(); }
function toggleEdit(id) {
  const row = document.getElementById('edit-' + id); if (!row) return;
  const open = row.classList.contains('open');
  document.querySelectorAll('.edit-row.open').forEach(r => r.classList.remove('open'));
  if (!open) row.classList.add('open');
}
function saveEdit(id) {
  const m = members.find(m => m.id === id); if (!m) return;
  const nv = document.getElementById('edit-name-' + id).value.trim();
  if (nv) m.name = nv;
  m.lv = clampLv(document.getElementById('edit-lv-' + id).value);
  if (pendingPhotos[id] !== undefined) { m.photo = pendingPhotos[id]; delete pendingPhotos[id]; }
  document.getElementById('edit-' + id).classList.remove('open');
  save(); renderMembers(); renderToday();
}
function toggleSelect(id) { selected.has(id) ? selected.delete(id) : selected.add(id); renderToday(); updateHeaderSubtitle(); }
function toggleSelectAll() {
  const all = members.length > 0 && members.every(m => selected.has(m.id));
  if (all) selected.clear(); else members.forEach(m => selected.add(m.id));
  renderToday(); updateHeaderSubtitle();
}
function setMode(m) { courtMode = m; ['auto', '1', '2'].forEach(k => document.getElementById('btn-' + k).classList.toggle('active', k === m)); }
function setMatchMode(m) {
  matchMode = m;
  document.getElementById('modeRandom').classList.toggle('active', m === 'random');
  document.getElementById('modeBalance').classList.toggle('active', m === 'balance');
  document.getElementById('generateBtn').classList.toggle('random-mode', m === 'random');
}

function renderMembers() {
  document.getElementById('memberCount').innerHTML = `登録メンバー <b>${members.length}</b>人`;
  const list = document.getElementById('memberList');
  if (!members.length) {
    list.innerHTML = '<div class="empty"><span class="empty-icon">👥</span><div class="empty-title">メンバーを登録してください</div><div>上のフォームから追加できます</div></div>';
    return;
  }
  list.innerHTML = members.map((m, i) => {
    const c = lvColor(m.lv);
    const delay  = `animation-delay:${i * 0.05}s;`;
    const fc     = FACE_CONFIGS[m.photo];
    const avatarHtml  = fc
      ? `<div class="avatar face-zoom" style="background-image:url('${m.photo}');background-size:${fc.size};background-position:${fc.pos};${delay}" title="${m.name}" onclick="showImgModal('${m.photo}','${m.name}')"></div>`
      : m.photo ? `<img class="avatar" src="${m.photo}" alt="${m.name}" style="${delay}" onclick="showImgModal('${m.photo}','${m.name}')"/>` : `<div class="avatar-placeholder">👤</div>`;
    const previewHtml = fc
      ? `<div id="photo-preview-${m.id}" class="avatar photo-preview-lg face-zoom" style="background-image:url('${m.photo}');background-size:${fc.size};background-position:${fc.pos};"></div>`
      : m.photo ? `<img id="photo-preview-${m.id}" class="avatar photo-preview-lg" src="${m.photo}"/>` : `<div id="photo-placeholder-${m.id}" class="avatar-placeholder photo-preview-lg">👤</div>`;
    return `
    <div class="player-tag">
      <div class="player-info">
        ${avatarHtml}
        <span>${m.name}</span>
        ${lvBadge(m.lv)}
        <div class="lv-bar-wrap" style="min-width:60px;">
          <div class="lv-bar-outer"><div class="lv-bar-inner" style="width:${m.lv}%;background:${c.bar};"></div></div>
        </div>
      </div>
      <div class="tag-actions">
        <button class="edit-btn" onclick="toggleEdit(${m.id})">編集</button>
        <button class="remove-btn" onclick="removeMember(${m.id})" aria-label="削除">×</button>
      </div>
    </div>
    <div class="edit-row" id="edit-${m.id}">
      <div class="flex-col">
        <div class="flex-row">
          ${previewHtml}
          <label class="photo-upload-label">📷 写真を変更<input type="file" accept="image/*" style="display:none;" onchange="handlePhotoChange(${m.id},this)"/></label>
        </div>
        <div class="flex-row gap-8">
          <input type="text" id="edit-name-${m.id}" value="${m.name}" placeholder="名前" style="flex:1;"/>
          <label style="font-size:12px;font-weight:700;color:var(--text-muted);white-space:nowrap;">Lv.</label>
          <input type="number" id="edit-lv-${m.id}" value="${m.lv}" min="1" max="100"/>
          <button class="save-btn" onclick="saveEdit(${m.id})">保存</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderToday() {
  const num = document.getElementById('selectedCountNum'); if (num) num.textContent = selected.size;
  const allSel = members.length > 0 && members.every(m => selected.has(m.id));
  document.getElementById('selectAllBtn').textContent = allSel ? '全解除' : '全選択';
  const list = document.getElementById('todayList');
  if (!members.length) { list.innerHTML = '<div class="empty"><span class="empty-icon">👥</span><div class="empty-title">メンバータブで登録してください</div></div>'; return; }
  list.innerHTML = members.map((m, i) => {
    const on = selected.has(m.id);
    const fc2 = FACE_CONFIGS[m.photo];
    const av = fc2
      ? `<div class="avatar face-zoom" style="background-image:url('${m.photo}');background-size:${fc2.size};background-position:${fc2.pos};animation-delay:${i*0.05}s;" title="${m.name}"></div>`
      : m.photo ? `<img class="avatar" src="${m.photo}" alt="${m.name}" style="animation-delay:${i*0.05}s;"/>` : `<div class="avatar-placeholder">👤</div>`;
    const wc = sessionWaitCount[m.id] || 0;
    const wcBadge = `<span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;background:${wc > 0 ? 'var(--accent-soft)' : 'var(--surface-3)'};color:${wc > 0 ? 'var(--accent-deep)' : 'var(--text-faint)'};">休憩${wc}回</span>`;
    return `<div class="player-tag" style="opacity:${on ? 1 : 0.42};cursor:pointer;${on ? 'border-color:var(--brand);box-shadow:0 2px 10px rgba(107,95,232,0.12);' : ''}" onclick="toggleSelect(${m.id})">
      <div class="player-info">
        <div class="check-circle ${on ? 'checked' : ''}">✓</div>
        ${av}<span>${m.name}</span>${lvBadge(m.lv)}${wcBadge}
      </div>
    </div>`;
  }).join('');
}

/* ==========================================
   ランダムキュー方式
   ========================================== */

/**
 * active 内で「チームメイトペア全て未経験（usedTeamPairs[key]===0）」の
 * 1試合分を最大60回のランダムシャッフルで探す。
 * 見つかれば courts 配列を返し、失敗すれば null を返す。
 */
function tryOneArrangement(active, types, usedTeamPairs) {
  let bestCourts = null, bestScore = Infinity;
  for (let attempt = 0; attempt < 60; attempt++) {
    const pool   = [...active].sort(() => Math.random() - 0.5);
    const courts = [];
    let score    = 0;

    for (let ci = 0; ci < types.length; ci++) {
      const need = types[ci] === 'singles' ? 2 : 4;
      if (pool.length < need) { courts.length = 0; break; }
      const group = pool.splice(0, need);

      if (types[ci] === 'singles') {
        courts.push([[group[0]], [group[1]]]);
      } else {
        const arrs = [
          [[group[0], group[1]], [group[2], group[3]]],
          [[group[0], group[2]], [group[1], group[3]]],
          [[group[0], group[3]], [group[1], group[2]]],
        ];
        // 未ペアを優先、同率なら最小ペア回数の組み合わせを選ぶ
        let bestArr = arrs[0], bestArrScore = Infinity;
        for (const arr of arrs) {
          const s = (usedTeamPairs[pairKey(arr[0][0], arr[0][1])] || 0) +
                    (usedTeamPairs[pairKey(arr[1][0], arr[1][1])] || 0);
          if (s < bestArrScore) { bestArrScore = s; bestArr = arr; }
        }
        score += bestArrScore;
        courts.push(bestArr);
      }
    }
    if (courts.length > 0 && score < bestScore) {
      bestScore  = score;
      bestCourts = courts;
      if (score === 0) break; // 全て未ペア → 最善
    }
  }
  return bestCourts;
}

/**
 * ランダムキューを事前生成する。
 * 参加者と休憩者の割り当てをシミュレートしながら、
 * 「全チームペアが未経験」の試合割り当てをキューに積む。
 */
function buildRandomQueue(participants, types) {
  randomQueue = [];
  const needed     = types.reduce((s, t) => s + (t === 'singles' ? 2 : 4), 0);
  const numSitters = participants.length - needed;

  // キュー生成専用の一時カウント（実際の teamPairCount から開始）
  const tempTP     = Object.assign({}, teamPairCount);
  const simWait    = {};

  for (let iter = 0; iter < 200; iter++) {
    // 休憩者をシミュレーション
    let active, waiters;
    if (numSitters <= 0) {
      active  = [...participants];
      waiters = [];
    } else {
      const shuffled = [...participants].sort(() => Math.random() - 0.5);
      shuffled.sort((a, b) => (simWait[a.id] || 0) - (simWait[b.id] || 0));
      waiters  = shuffled.slice(0, numSitters);
      const wIds = new Set(waiters.map(p => p.id));
      active   = participants.filter(p => !wIds.has(p.id));
    }

    const courts = tryOneArrangement(active, types, tempTP);
    if (!courts) break; // これ以上有効な組み合わせなし

    randomQueue.push({ courts, waiting: waiters });

    // tempTP を更新
    courts.forEach(court => {
      [court[0], court[1]].forEach(team => {
        for (let i = 0; i < team.length; i++)
          for (let j = i + 1; j < team.length; j++) {
            const k = pairKey(team[i], team[j]);
            tempTP[k] = (tempTP[k] || 0) + 1;
          }
      });
    });
    waiters.forEach(p => { simWait[p.id] = (simWait[p.id] || 0) + 1; });
  }

  randomQueueSig = makeQueueSig(participants, types);
}

function makeQueueSig(participants, types) {
  return participants.map(p => p.id).sort().join(',') + '|' + types.join(',');
}

/* ==========================================
   バランスモード: スコアリング（5回ルール）
   ========================================== */
function scoreArrangement(teamA, teamB) {
  let penalty = 0;
  [teamA, teamB].forEach(team => {
    for (let i = 0; i < team.length; i++)
      for (let j = i + 1; j < team.length; j++) {
        const cnt = teamPairCount[pairKey(team[i], team[j])] || 0;
        // 組んだ回数に比例してペナルティ増加（未ペアを常に最優先）
        if (cnt > 0) penalty += 80000 * cnt;
      }
  });
  const sA = teamA.reduce((s, p) => s + p.lv, 0);
  const sB = teamB.reduce((s, p) => s + p.lv, 0);
  return penalty + Math.abs(sA - sB);
}

function generateMixedBalance(active, types) {
  let remaining = [...active].sort(() => Math.random() - 0.5);
  const courts = [], waiting = [];

  for (let ci = 0; ci < types.length; ci++) {
    const isSingles = types[ci] === 'singles';
    const need      = isSingles ? 2 : 4;
    if (remaining.length < need) break;
    const cands = remaining;
    let bestScore = Infinity, bestGroup = null, bestArr = null;

    if (isSingles) {
      for (let a = 0; a < cands.length - 1; a++)
        for (let b = a + 1; b < cands.length; b++) {
          const s = scoreArrangement([cands[a]], [cands[b]]);
          if (s < bestScore) { bestScore = s; bestGroup = [cands[a], cands[b]]; bestArr = [[cands[a]], [cands[b]]]; }
        }
    } else {
      for (let a = 0; a < cands.length - 3; a++)
        for (let b = a + 1; b < cands.length - 2; b++)
          for (let c = b + 1; c < cands.length - 1; c++)
            for (let d = c + 1; d < cands.length; d++) {
              const four = [cands[a], cands[b], cands[c], cands[d]];
              const arrs = [
                [[four[0], four[1]], [four[2], four[3]]],
                [[four[0], four[2]], [four[1], four[3]]],
                [[four[0], four[3]], [four[1], four[2]]],
              ];
              for (const arr of arrs) {
                const s = scoreArrangement(arr[0], arr[1]);
                if (s < bestScore) { bestScore = s; bestGroup = four; bestArr = arr; }
              }
            }
    }
    if (!bestGroup) break;
    courts.push(bestArr);
    const usedIds = new Set(bestGroup.map(p => p.id));
    remaining = remaining.filter(p => !usedIds.has(p.id));
  }
  remaining.forEach(p => waiting.push(p));
  return { courts, waiting };
}

function getNumCourts() { return courtMode === '1' ? 1 : courtMode === '2' ? 2 : null; }

/* ==========================================
   試合生成メイン
   ========================================== */
function generateMatch(isNew) {
  const participants = members.filter(m => selected.has(m.id));
  if (participants.length < 2) {
    document.getElementById('results').innerHTML = '<div class="empty"><span class="empty-icon">🎾</span><div class="empty-title">2人以上選択してください</div></div>';
    return;
  }

  const numCourtsFixed = getNumCourts();
  const maxCourts      = numCourtsFixed || Math.floor(participants.length / 4) || 1;

  if (isNew) {
    currentRound = 1; matchHistory = []; courtResults = [];
    courtTypes   = Array(maxCourts).fill('doubles');
    sessionWaitCount = {}; randomQueue = []; randomQueueSig = '';
  } else {
    currentRound++;
    while (courtTypes.length < maxCourts) courtTypes.push('doubles');
    courtTypes = courtTypes.slice(0, maxCourts);
  }

  const needed = courtTypes.reduce((s, t) => s + (t === 'singles' ? 2 : 4), 0);
  if (participants.length < needed) {
    document.getElementById('results').innerHTML = `<div class="empty"><span class="empty-icon">🎾</span><div class="empty-title">人数が足りません</div><div>${needed}人必要（現在${participants.length}人）</div></div>`;
    return;
  }

  let courts, waiting;

  if (matchMode === 'random') {
    /* ---- ランダム: キュー方式 ---- */
    const sig = makeQueueSig(participants, courtTypes);
    if (sig !== randomQueueSig || randomQueue.length === 0) {
      buildRandomQueue(participants, courtTypes);
      if (randomQueue.length === 0) {
        // 全ペアを一周した → 履歴を保持したまま最小ペア回数で再ビルド
        showShareMsg('🔄 全コンビを経験！ペア回数の少ない順に優先して続けます');
        buildRandomQueue(participants, courtTypes);
      }
    }

    if (randomQueue.length > 0) {
      const item = randomQueue.shift();
      courts  = item.courts;
      waiting = item.waiting;
      // 実際の sessionWaitCount を同期
      waiting.forEach(p => { sessionWaitCount[p.id] = (sessionWaitCount[p.id] || 0) + 1; });
    } else {
      // フォールバック（参加者が2人以下など）: 単純ランダム
      courts  = [];
      waiting = [...participants];
    }

  } else {
    /* ---- バランスモード ---- */
    const numSitters = participants.length - needed;
    let forcedWaiters = [], active = [...participants];
    if (numSitters > 0) {
      const sorted = [...participants].sort(() => Math.random() - 0.5);
      sorted.sort((a, b) => (sessionWaitCount[a.id] || 0) - (sessionWaitCount[b.id] || 0));
      forcedWaiters = sorted.slice(0, numSitters);
      const fIds    = new Set(forcedWaiters.map(p => p.id));
      active        = participants.filter(p => !fIds.has(p.id));
    }
    const result  = generateMixedBalance(active, courtTypes);
    courts        = result.courts;
    const allWait = [...forcedWaiters, ...result.waiting];
    allWait.forEach(p => { sessionWaitCount[p.id] = (sessionWaitCount[p.id] || 0) + 1; });
    waiting = allWait;
  }

  // ペアカウント更新（全ペア & チームペア）
  courts.forEach(court => {
    const all = [...court[0], ...court[1]];
    // 全ペア（同コートに立った）
    all.forEach((p, i) => all.forEach((q, j) => {
      if (i < j) { const k = pairKey(p, q); pairCount[k] = (pairCount[k] || 0) + 1; }
    }));
    // チームペアのみ
    [court[0], court[1]].forEach(team => {
      for (let i = 0; i < team.length; i++)
        for (let j = i + 1; j < team.length; j++) {
          const k = pairKey(team[i], team[j]);
          teamPairCount[k] = (teamPairCount[k] || 0) + 1;
        }
    });
  });
  save();

  matchHistory.push({ courts, waiting, mode: matchMode, courtTypes: [...courtTypes] });
  courtResults.push(courts.map(() => null));
  renderResults();
  renderToday();
  if (vsAnimEnabled) showAllVsAnimation(matchHistory.length - 1);
}

function toggleCourtType(ci) {
  courtTypes[ci] = courtTypes[ci] === 'singles' ? 'doubles' : 'singles';
  const roundIdx = matchHistory.length - 1;
  if (roundIdx >= 0) {
    const oldRound = matchHistory[roundIdx];
    // ペアカウントを巻き戻す
    oldRound.courts.forEach(court => {
      const all = [...court[0], ...court[1]];
      all.forEach((p, i) => all.forEach((q, j) => {
        if (i < j) { const k = pairKey(p, q); pairCount[k] = Math.max(0, (pairCount[k] || 1) - 1); }
      }));
      [court[0], court[1]].forEach(team => {
        for (let i = 0; i < team.length; i++)
          for (let j = i + 1; j < team.length; j++) {
            const k = pairKey(team[i], team[j]);
            teamPairCount[k] = Math.max(0, (teamPairCount[k] || 1) - 1);
          }
      });
    });
    (oldRound.waiting || []).forEach(p => { sessionWaitCount[p.id] = Math.max(0, (sessionWaitCount[p.id] || 1) - 1); });
    matchHistory.pop(); courtResults.pop(); currentRound--;
    randomQueue = []; // コート形式変更でキューを無効化
  }
  generateMatch(false);
}

/* ==========================================
   スコア計算（Lv方式）
   ========================================== */
function calcDelta(myTeamLv, oppTeamLv, win) {
  const E   = 1 / (1 + Math.pow(10, (oppTeamLv - myTeamLv) / 80));
  const raw = Math.round(20 * ((win ? 1 : 0) - E));
  const sign = raw >= 0 ? 1 : -1;
  return sign * Math.min(8, Math.max(1, Math.abs(raw)));
}

function applyLvChange(memberId, delta) {
  const m = members.find(x => x.id === memberId); if (!m) return null;
  const prevLv = m.lv;
  m.lv = Math.min(100, Math.max(1, m.lv + delta));
  return { name: m.name, delta: m.lv - prevLv, prevLv, newLv: m.lv };
}

function revertLvChange(memberId, delta) {
  const m = members.find(x => x.id === memberId); if (!m) return;
  m.lv = Math.min(100, Math.max(1, m.lv - delta));
}

function applyResult(roundIdx, courtIdx, winner) {
  const prev  = courtResults[roundIdx][courtIdx];
  const round = matchHistory[roundIdx]; if (!round) return;
  const court = round.courts[courtIdx];
  const teamA = court[0], teamB = court[1];
  const sA    = teamA.reduce((s, p) => s + p.lv, 0);
  const sB    = teamB.reduce((s, p) => s + p.lv, 0);
  if (prev && prev !== winner) revertResult(teamA, teamB, sA, sB, prev);
  courtResults[roundIdx][courtIdx] = winner;
  if (winner === 'draw') { save(); renderMembers(); renderResults(); return; }
  const winTeam  = winner === 'A' ? teamA : teamB;
  const loseTeam = winner === 'A' ? teamB : teamA;
  const winStr   = winner === 'A' ? sA    : sB;
  const loseStr  = winner === 'A' ? sB    : sA;
  const changes  = [];
  winTeam.forEach (p => { const d = calcDelta(winStr,  loseStr, true);  const r = applyLvChange(p.id,  d); if (r) changes.push(r); });
  loseTeam.forEach(p => { const d = calcDelta(loseStr, winStr,  false); const r = applyLvChange(p.id,  d); if (r) changes.push(r); });
  round.changes = round.changes || {};
  round.changes[courtIdx] = changes;
  save(); renderMembers(); renderResults();
}

function revertResult(teamA, teamB, sA, sB, prev) {
  if (prev === 'draw') return;
  const winTeam  = prev === 'A' ? teamA : teamB;
  const loseTeam = prev === 'A' ? teamB : teamA;
  const winStr   = prev === 'A' ? sA    : sB;
  const loseStr  = prev === 'A' ? sB    : sA;
  winTeam.forEach (p => { const d = calcDelta(winStr,  loseStr, true);  revertLvChange(p.id,  d); });
  loseTeam.forEach(p => { const d = calcDelta(loseStr, winStr,  false); revertLvChange(p.id, d); });
}

/* ==========================================
   結果表示
   ========================================== */
function renderResults() {
  const res = document.getElementById('results');
  if (!matchHistory.length) { res.innerHTML = ''; return; }
  const roundIdx = matchHistory.length - 1;
  const round    = matchHistory[roundIdx];
  const { courts, waiting, mode, courtTypes: rCT } = round;
  const isRandom  = mode === 'random';
  const qLeft     = isRandom ? randomQueue.length : 0;

  let html = `<div class="round-header">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span class="round-label">${currentRound}試合目</span>
      <span class="mode-label ${isRandom ? 'random' : 'balance'}">${isRandom ? '🎲 ランダム' : '⚖️ バランス'}</span>
      ${isRandom ? `<span class="queue-badge">残${qLeft}通り</span>` : ''}
    </div>
    <button class="next-btn ${isRandom ? 'random-mode' : ''}" onclick="generateMatch(false)">次の試合 →</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:10px;">
    <button class="vs-anim-btn" style="flex:1;margin-bottom:0;" onclick="showAllVsAnimation(${roundIdx})">⚡ アニメーション表示</button>
    <button class="vs-toggle-btn ${vsAnimEnabled ? 'on' : 'off'}" onclick="toggleVsAnim()">${vsAnimEnabled ? '自動 ON' : '自動 OFF'}</button>
  </div>`;

  courts.forEach((court, ci) => {
    const sA     = court[0].reduce((s, p) => s + p.lv, 0);
    const sB     = court[1].reduce((s, p) => s + p.lv, 0);
    const diff   = Math.abs(sA - sB);
    const winner = courtResults[roundIdx][ci];
    const clsA   = winner === 'A' ? 'win' : winner ? 'lose' : '';
    const clsB   = winner === 'B' ? 'win' : winner ? 'lose' : '';
    const clsD   = winner === 'draw' ? 'win' : '';

    let deltaHtml = '';
    if (winner && winner !== 'draw') {
      const changes = (round.changes && round.changes[ci]) || [];
      if (changes.length) {
        const lines = changes.map(c => {
          const sign = c.delta > 0 ? '＋' : '';
          const cls  = c.delta > 0 ? 'delta-plus' : 'delta-minus';
          const arrow = c.delta > 0
            ? `<span style="color:var(--brand);font-size:10px;"> ▲${c.prevLv}→${c.newLv}</span>`
            : `<span style="color:var(--accent);font-size:10px;"> ▼${c.prevLv}→${c.newLv}</span>`;
          return `<span class="${cls}">${c.name} ${sign}${c.delta}Lv${arrow}</span>`;
        });
        deltaHtml = `<div class="delta-row">${lines.join('　')}</div>`;
      }
    }

    const cell = (p, right = false) => {
      const cfc = FACE_CONFIGS[p.photo];
      const av = cfc
        ? `<div style="width:28px;height:28px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--divider-strong);background-image:url('${p.photo}');background-size:${cfc.size};background-position:${cfc.pos};"></div>`
        : p.photo
          ? `<img style="width:28px;height:28px;border-radius:50%;object-fit:cover;object-position:center 20%;flex-shrink:0;border:1.5px solid var(--divider-strong);" src="${p.photo}"/>`
          : `<div style="width:28px;height:28px;border-radius:50%;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;">👤</div>`;
      return right
        ? `<div class="team-player">${p.name}${lvBadge(p.lv)}${av}</div>`
        : `<div class="team-player">${av}${lvBadge(p.lv)}${p.name}</div>`;
    };
    const teamBadge = team => {
      if (team.length < 2) return '';
      const cnt = teamPairCount[pairKey(team[0], team[1])] || 0;
      if (cnt === 1) return `<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;background:#E1F5EE;color:#085041;white-space:nowrap;">✨ 初コンビ</span>`;
      if (cnt > 1)  return `<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:100px;background:var(--surface-3);color:var(--text-muted);white-space:nowrap;">🔁 ${cnt}回目</span>`;
      return '';
    };

    html += `<div class="court-card">
      <div class="court-header">
        <div class="court-title-group">
          <span class="court-num">COURT ${ci + 1}</span>
          <span class="balance-pill">${diff === 0 ? '均等' : `差${diff}Lv`}</span>
        </div>
        <div class="type-seg">
          <button class="${rCT[ci] === 'doubles' ? 'active' : ''}" onclick="if('${rCT[ci]}'!=='doubles')toggleCourtType(${ci})">ダブルス</button>
          <button class="${rCT[ci] === 'singles' ? 'active' : ''}" onclick="if('${rCT[ci]}'!=='singles')toggleCourtType(${ci})">シングルス</button>
        </div>
      </div>
      <div class="teams">
        <div class="team">${court[0].map(p => cell(p, false)).join('')}${teamBadge(court[0])}</div>
        <div class="vs">VS</div>
        <div class="team team-right">${teamBadge(court[1])}${court[1].map(p => cell(p, true)).join('')}</div>
      </div>
      <div class="result-btns">
        <button class="result-btn ${clsA}" onclick="applyResult(${roundIdx},${ci},'A')">← 左チーム勝ち</button>
        <button class="result-btn ${clsD}" onclick="applyResult(${roundIdx},${ci},'draw')" style="flex:0.6;font-size:12px;">引分</button>
        <button class="result-btn ${clsB}" onclick="applyResult(${roundIdx},${ci},'B')">右チーム勝ち →</button>
      </div>
      ${deltaHtml}
    </div>`;
  });

  if (waiting.length) {
    html += `<div class="wait-card">待機中: <b>${waiting.map(p =>
      `${p.name}${lvBadge(p.lv)}<span style="font-size:10px;font-weight:600;color:var(--accent-deep);margin-left:3px;"> 休憩${sessionWaitCount[p.id] || 0}回</span>`
    ).join('　')}</b></div>`;
  }
  res.innerHTML = html;
}

/* ==========================================
   VS アニメーション
   ========================================== */
function buildVsHTML(courts) {
  const multi = courts.length > 1;

  function playerSlot(p) {
    const c = lvColor(p.lv);
    let artHtml;
    if (p.photo) {
      const vc = VS_CHAR_CONFIGS[p.photo] || VS_CHAR_DEFAULT;
      artHtml = `<div class="vs-char-art-bg" style="background-image:url('${p.photo}');background-size:${vc.bgSize};background-position:${vc.bgPos};"></div>`;
    } else {
      artHtml = `<div class="vs-char-emoji">👤</div>`;
    }
    return `<div class="vs-char-slot">
      ${artHtml}
      <div class="vs-char-name">${p.name}</div>
      <span class="vs-char-lv" style="background:${c.solid};">Lv.${p.lv}</span>
    </div>`;
  }

  let sections = '';
  courts.forEach((court, ci) => {
    const teamA = court[0], teamB = court[1];
    const vsClass = multi ? 'vs-vs small' : 'vs-vs';
    const divider = ci > 0 ? '<div class="vs-divider"></div>' : '';
    const label   = multi ? `<div class="vs-court-label">COURT ${ci + 1}</div>` : '';
    sections += `${divider}
      <div class="vs-court-section">
        ${label}
        <div class="vs-smash-row">
          <div class="vs-char-half left">${teamA.map(playerSlot).join('')}</div>
          <div class="vs-smash-center"><div class="${vsClass}">VS</div></div>
          <div class="vs-char-half right">${teamB.map(playerSlot).join('')}</div>
        </div>
      </div>`;
  });

  return `<div class="vs-rays"></div>
    <div class="vs-split-left"></div><div class="vs-split-right"></div>
    <div class="vs-flash"></div>
    <div class="vs-courts-wrap">${sections}</div>
    <div class="vs-hint">タップして閉じる</div>`;
}

function toggleVsAnim() {
  vsAnimEnabled = !vsAnimEnabled;
  localStorage.setItem('tennis_vs_anim', vsAnimEnabled ? 'on' : 'off');
  renderResults();
}
function showAllVsAnimation(roundIdx) {
  const round = matchHistory[roundIdx]; if (!round) return;
  _openVsOverlay(round.courts);
}
function _openVsOverlay(courts) {
  const ol = document.getElementById('vsOverlay');
  ol.innerHTML = buildVsHTML(courts);
  ol.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeVsOverlay() {
  document.getElementById('vsOverlay').style.display = 'none';
  document.body.style.overflow = '';
}

function showImgModal(photo, name) {
  if (!photo) return;
  document.getElementById('imgModalImg').src = photo;
  document.getElementById('imgModalImg').alt = name || '';
  document.getElementById('imgModalName').textContent = name || '';
  document.getElementById('imgModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeImgModal() {
  document.getElementById('imgModal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeImgModal(); });

/* ==========================================
   起動
   ========================================== */
load();
updateHeaderSubtitle();
</script>
</body>
</html>
